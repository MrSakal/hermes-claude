name: hermes-claude-code
version: 0.1.0
kind: standalone
description: "Claude Code provider, local proxy autostart, and management commands for Hermes."
author: Nous Research
provides_hooks:
  - on_session_start
optional_env:
  - name: ANTHROPIC_API_KEY
    description: "Claude API key (or authenticate the `claude` CLI instead)."
    password: true
  - name: HERMES_CLAUDE_CODE_PORT
    description: "Local proxy port (default 35345)."
  - name: HERMES_CLAUDE_CODE_MODE
    description: "strict (default) or agentic tool handling."
